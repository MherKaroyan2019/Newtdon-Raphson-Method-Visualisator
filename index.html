<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwon-Raphson Method Visualisator</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="header">
        <div class="title">
            <h1>Netwon-Raphson Method Visualisator</h1>
        </div>
    </div>
    <div class="body">
        <div class="inputs">
            <h2>Initial Data</h2>
            <label for="func">Function</label>
            <input type="text" id="func">
            <label for="deriv">Derivative</label>
            <input type="text" id="deriv">
            <label for="start">Starting Initail guess</label>
            <input type="number" id="start">
            <label for="end">Ending Initial guess</label>
            <input type="number" id="end">
            <label for="step">Step</label>
            <input type="number" min="0" id="step">
            <button>Calculate</button>
        </div>
        <div class="result">
            <div class="table">

            </div>
            <div class="info">

            </div>
        </div>
    </div>
    <div class="footer">
        <div class="">

        </div>
    </div>
</body>
</html>
